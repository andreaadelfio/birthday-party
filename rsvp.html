<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RSVP | Matteo's Birthday</title>
    <script>
      document.documentElement.classList.add("has-js");
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&amp;family=Roboto:wght@300;400;500;700&amp;family=Catamaran:wght@400;700;800;900&amp;display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="subpage lego-theme" data-nav-current="registration">
    <div data-site-header></div>
    <main class="subpage-main">
      <section class="rsvp-section rsvp-page-section">
        <div class="container rsvp-layout">
          <div class="rsvp-copy reveal">
            <h2>Please reply by <span data-rsvp-deadline>July 4, 2026</span>.</h2>
            <p class="rsvp-contact">
              Contact:
              <a href="#" data-contact-link data-contact-email></a>
            </p>

            <div class="rsvp-summary">
              <article>
                <span>Date</span>
                <strong data-display-date></strong>
              </article>
              <article>
                <span>Time</span>
                <strong data-display-time></strong>
              </article>
              <article>
                <span>Venue</span>
                <strong data-venue-name></strong>
              </article>
              <article>
                <span>Address</span>
                <strong data-address></strong>
              </article>
            </div>

            <div class="rsvp-info-grid">
              <article class="rsvp-info-card">
                <span>Groups</span>
                <h3>Pick yours from the list.</h3>
                <p>
                  Start by choosing one of the groups already available in the database.
                </p>
              </article>
            </div>

            <div class="hero-actions">
              <a class="button button-dark-outline brick-6" href="index.html#schedule">
                Back to event page
              </a>
              <a class="button button-primary brick-5" href="music.html">
                Open music page
              </a>
              <button class="button button-outline brick-5" type="button" data-download-ics>
                Add to calendar
              </button>
            </div>
          </div>

          <form class="rsvp-form reveal" id="rsvp-form">
            <div class="name-grid">
              <label>
                Name
                <input type="text" name="name" placeholder="Alex" required />
              </label>

              <label>
                Surname
                <input type="text" name="surname" placeholder="Morgan" required />
              </label>
            </div>

            <label>
              Email address
              <input
                type="email"
                name="email"
                placeholder="alex@email.com"
                required
              />
            </label>

            <label>
              Group
              <select name="group_slug" id="group-slug" disabled>
                <option value="" selected>Loading groups...</option>
              </select>
            </label>

            <label>
              Number of guests
              <select name="guests" required>
                <option value="1">Just me</option>
                <option value="2">Me + 1</option>
                <option value="3">Me + 2</option>
              </select>
            </label>

            <label>
              Message or dietary notes
              <textarea
                name="notes"
                rows="4"
                placeholder="Vegetarian, allergy details, or a short note for the host"
              ></textarea>
            </label>

            <p class="form-hint">
              If you need to update your info, send the form again with the same email.
            </p>

            <div class="form-actions">
              <button class="button button-success brick-6" type="submit">
                Send RSVP
              </button>
              <button class="button button-outline brick-5" type="button" data-download-ics>
                Add to calendar
              </button>
            </div>

            <p class="form-status" id="form-status" aria-live="polite"></p>
          </form>
        </div>
      </section>
    </main>

    <div data-site-footer></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="script.js"></script>
  </body>
</html>
